# goreleaser config for carlos
# Run with `goreleaser release --clean` after tagging a release.
# Run with `goreleaser build --snapshot --clean` to smoke-test without
# publishing.
#
# Output: macOS (arm64 + amd64) + Linux (arm64 + amd64) tarballs in
# dist/, with checksums + a draft GitHub release. Each release also
# pushes a Formula/carlos.rb to georgebuilds/homebrew-tap so users can
# `brew install georgebuilds/tap/carlos`.
#
# CI: see .github/workflows/release.yml — runs on `v*` tag push.

version: 2

project_name: carlos

before:
  hooks:
    - go mod tidy

builds:
  - id: carlos
    main: ./cmd/carlos
    binary: carlos
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Inject the version + commit + date into runtime/debug.BuildInfo
    # so `carlos version` shows the tagged release name instead of
    # the pseudo-version. -trimpath strips local file paths from
    # binary metadata for reproducibility.
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: carlos
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'merge:'
      - 'Merge branch'
      - '^chore:'

release:
  github:
    owner: georgebuilds
    name: carlos
  # Draft so I can hand-edit the release notes before publishing.
  draft: true
  # Mark as prerelease until carlos hits v1.
  prerelease: auto
  name_template: "carlos {{ .Tag }}"
  header: |
    ## carlos {{ .Tag }}
    A coding agent.
  footer: |
    ---
    **Install**
    - macOS / Linuxbrew: `brew install georgebuilds/tap/carlos`
    - Other Linux: extract the tarball for your platform and drop `carlos` into your `$PATH`.

# Homebrew tap integration. Each release pushes a fresh Formula/carlos.rb
# to georgebuilds/homebrew-tap. Requires HOMEBREW_TAP_GITHUB_TOKEN —
# a fine-grained PAT scoped to the tap repo with Contents: read+write.
# CI workflow injects it via repo secret of the same name.
#
# Skip on prereleases so a `v0.1.0-rc1` tag doesn't overwrite a stable
# formula. Toggle to false once carlos is post-v1 and stable releases
# carry no prerelease suffix.
brews:
  - name: carlos
    repository:
      owner: georgebuilds
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/georgebuilds/carlos
    description: "Pure-Go TUI agent with skill induction and sub-agent supervision."
    license: "GPL-3.0-or-later"
    # Skip prereleases so a `v0.1.0-rc1` tag doesn't clobber a stable
    # formula. Stable tags (no -suffix) write through.
    skip_upload: auto
    test: |
      system "#{bin}/carlos", "version"
    install: |
      bin.install "carlos"

# Reproducible builds: source-date-epoch from the commit timestamp so
# rebuilding the same tag produces bit-identical artifacts.
metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'
