# CI gate for pull requests targeting main. Does NOT fire on pushes
# to main: that path is the release pipeline (.github/workflows/
# release.yml on `v*` tags). Manual `workflow_dispatch` is available
# for re-runs from the Actions tab.
#
# # Job split
#
# Three parallel jobs:
#   - `check`: vet + go.mod-tidy guard. The tidy step is gated on a
#     paths-filter so docs-only / source-only PRs skip the module
#     graph walk entirely. Fast (<15s warm); surfaces style + dep
#     drift early so the PR status row shows the cheap signal before
#     the test suite finishes.
#   - `test-shard-1` / `test-shard-2`: two parallel runners chewing
#     through complementary halves of `./...`. Sharding is done by
#     hand-curated path prefixes (`internal/agent/...` is the heavy
#     one and gets its own shard) so the runners finish in roughly
#     the same wall time. Each shard streams a per-shard coverage
#     profile; Codecov merges them on upload.
#
# Running them in parallel bounds wall time by the longest job. The
# setup-go cache makes the per-job spin-up cheap enough that the
# wall-clock win beats running setup three times.
#
# # Caching
#
# actions/setup-go@v6's built-in `cache: true` covers GOMODCACHE +
# the build cache, keyed off go.sum + Go toolchain version. No
# explicit cache action needed.
#
# # Concurrency
#
# `cancel-in-progress` on a group keyed by `github.ref` drops
# superseded runs when a new commit lands on the same PR head, so
# the queue doesn't pile up.

name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: vet + tidy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need at least 2 commits so the path-change diff below can
          # compare HEAD against its parent. fetch-depth: 0 would
          # work but is wastefully wider.
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Pin to the toolchain go.mod declares so CI uses exactly
          # what was tested locally.
          go-version-file: go.mod
          cache: true

      - name: Detect go.mod / go.sum changes
        # Output `changed=true|false`. The downstream tidy step only
        # runs when the module graph actually changed; a typical
        # source-only PR skips a ~3s `go mod tidy` walk + the diff
        # check. Compares HEAD against the PR base for pull requests
        # and against HEAD^ for manual dispatches.
        id: mod_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="HEAD^"
          fi
          if git diff --quiet "$base"...HEAD -- go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: go mod tidy is a no-op
        if: steps.mod_changes.outputs.changed == 'true'
        # `go mod tidy` should leave go.mod and go.sum unchanged.
        # If this step fails, run it locally and commit the result.
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

  test-shard-1:
    name: test (shard 1 — agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test (agent shard)
        # internal/agent is by far the heaviest package (sub-agent
        # supervisor + state machine + projection + event log). Give
        # it a dedicated shard so the second shard's "everything
        # else" finishes in roughly the same wall time.
        run: |
          go test \
            -count=1 -timeout=5m \
            -coverprofile=coverage.txt -covermode=atomic \
            ./internal/agent/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
          flags: shard-1
          token: ${{ secrets.CODECOV_TOKEN }}

  test-shard-2:
    name: test (shard 2 — rest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: List packages outside agent
        # Build the package list dynamically so a new package shipped
        # outside internal/agent automatically lands here without a
        # workflow edit. `go list ./...` is fast (~1s warm).
        id: pkgs
        run: |
          pkgs=$(go list ./... | grep -v '^github.com/georgebuilds/carlos/internal/agent' | tr '\n' ' ')
          echo "list=$pkgs" >> "$GITHUB_OUTPUT"

      - name: Test (non-agent shard)
        run: |
          go test \
            -count=1 -timeout=5m \
            -coverprofile=coverage.txt -covermode=atomic \
            ${{ steps.pkgs.outputs.list }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
          flags: shard-2
          token: ${{ secrets.CODECOV_TOKEN }}
